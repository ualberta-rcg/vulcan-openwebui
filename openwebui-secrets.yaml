---
apiVersion: v1
kind: Namespace
metadata:
  name: openwebui

---
# Replace all CHANGEME values with real credentials before applying.
# This file MUST be applied before deploying Qdrant (Helm) or OpenWebUI,
# because both reference these secrets via secretKeyRef.
#
# database-url and redis-url embed the password in a known URL template:
#   database-url = postgresql://openwebui:<postgres-password>@postgres:5432/openwebui
#   redis-url    = redis://default:<redis-password>@redis:6379/0
apiVersion: v1
kind: Secret
metadata:
  name: openwebui-secrets
  namespace: openwebui
type: Opaque
stringData:
  webui-secret-key: "CHANGEME"
  postgres-password: "CHANGEME"
  database-url: "postgresql://openwebui:CHANGEME@postgres:5432/openwebui"
  redis-password: "CHANGEME"
  redis-url: "redis://default:CHANGEME@redis:6379/0"
  qdrant-api-key: "CHANGEME"
  oauth-client-secret: "CHANGEME"
  perplexity-api-key: "CHANGEME"
  youtube-loader-api-key: "CHANGEME"
  openai-api-key: "CHANGEME"
  inference-api-key: "CHANGEME"
