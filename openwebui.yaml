---
# PostgreSQL PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: openwebui
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: nfs-client  # SITE-SPECIFIC: your StorageClass

---
# PostgreSQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: openwebui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:16
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "openwebui"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openwebui-secrets
                  key: postgres-password
            - name: POSTGRES_DB
              value: "openwebui"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "openwebui"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "openwebui"]
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "256m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "4Gi"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: openwebui
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP

---
# Redis PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: openwebui
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: nfs-client  # SITE-SPECIFIC: your StorageClass

---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: openwebui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: redis
          image: redis:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openwebui-secrets
                  key: redis-password
          command: ["sh", "-c"]
          args:
            - |
              exec redis-server \
                --save "" \
                --appendonly yes \
                --requirepass "$REDIS_PASSWORD"
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-data

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: openwebui
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP

---
# Apache Tika Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tika
  namespace: openwebui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tika
  template:
    metadata:
      labels:
        app: tika
    spec:
      containers:
        - name: tika
          image: apache/tika:latest-full
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 9998
          readinessProbe:
            httpGet:
              path: /tika
              port: 9998
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /tika
              port: 9998
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "4Gi"

---
# Tika HPA
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tika
  namespace: openwebui
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tika
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
# Tika Service
apiVersion: v1
kind: Service
metadata:
  name: tika
  namespace: openwebui
spec:
  selector:
    app: tika
  ports:
    - port: 9998
      targetPort: 9998
  type: ClusterIP

---
# Open WebUI PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openwebui-data
  namespace: openwebui
spec:
  # SITE-SPECIFIC: New deployments should use ReadWriteMany for multi-replica.
  # Vulcan uses RWO because the existing PVC was created as RWO and accessModes
  # are immutable. NFS-backed RWO still allows multi-attach in practice.
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: nfs-client  # SITE-SPECIFIC: your StorageClass

---
# Open WebUI Deployment (upgraded: pgvector -> qdrant)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  namespace: openwebui
  labels:
    app: openwebui
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: openwebui
  template:
    metadata:
      labels:
        app: openwebui
    spec:
      terminationGracePeriodSeconds: 60
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: openwebui
                topologyKey: kubernetes.io/hostname
      # SITE-SPECIFIC: hostAliases — remove or replace with your internal DNS entries
      hostAliases:
        - ip: "172.26.92.232"
          hostnames:
            - ray
        - ip: "172.26.92.29"
          hostnames:
            - vulcan01.ldap.computecanada.ca
            - ldap1
            - ldap1.vulcan.local
        - ip: "172.26.92.30"
          hostnames:
            - vulcan02.ldap.computecanada.ca
            - ldap2
            - ldap2.vulcan.local
      containers:
        - name: openwebui
          image: ghcr.io/open-webui/open-webui:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 8080
              name: http

          env:
            - name: WEBUI_NAME
              value: "Vulcan Cluster"  # SITE-SPECIFIC: your instance name

            - name: WEBUI_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: openwebui-secrets
                  key: webui-secret-key

            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: openwebui-secrets
                  key: database-url

            # ---- OAuth / OIDC ----
            - name: OAUTH_CLIENT_ID
              value: "llm.vulcan.alliancecan.ca"  # SITE-SPECIFIC: OIDC client ID

            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: openwebui-secrets
                  key: oauth-client-secret

            - name: OPENID_PROVIDER_URL
              value: "https://idp-dev.alliancecan.ca/.well-known/openid-configuration"  # SITE-SPECIFIC

            - name: OAUTH_PROVIDER_NAME
              value: "Digital Research Alliance of Canada"  # SITE-SPECIFIC

            - name: OAUTH_SCOPES
              value: "openid email profile ca.alliancecan.userinfo"  # SITE-SPECIFIC

            - name: OPENID_REDIRECT_URI
              value: "https://llm.vulcan.alliancecan.ca/oauth/oidc/callback"  # SITE-SPECIFIC: https://<your-domain>/oauth/oidc/callback

            - name: ENABLE_OAUTH_SIGNUP
              value: "true"

            - name: OAUTH_EMAIL_CLAIM
              value: "ccPrimaryEmail"  # SITE-SPECIFIC: depends on your OIDC provider

            - name: OAUTH_USERNAME_CLAIM
              value: "preferred_username"

            - name: OAUTH_MERGE_ACCOUNTS_BY_EMAIL
              value: "true"

            - name: OAUTH_CLIENT_AUTH_METHOD
              value: "client_secret_post"

            - name: ENABLE_OAUTH_PERSISTENT_CONFIG
              value: "false"

            # ---- General ----
            - name: DATA_DIR
              value: "/app/backend/data"

            - name: WEBUI_URL
              value: "https://llm.vulcan.alliancecan.ca"  # SITE-SPECIFIC: your public URL

            - name: ENABLE_COMMUNITY_SHARING
              value: "true"

            - name: ENABLE_MESSAGE_RATING
              value: "true"

            - name: ENABLE_COMMENT_ON_SHARED_CHAT
              value: "true"

            - name: ENABLE_API_KEYS
              value: "true"

            - name: ENABLE_USER_WEBHOOKS
              value: "true"

            - name: ENABLE_SIGNUP
              value: "false"

            - name: DEFAULT_USER_ROLE
              value: "user"

            - name: ENABLE_LOGIN_FORM
              value: "false"

            - name: DISABLE_PROVIDER_EDIT
              value: "false"

            # ---- Vector Database (Qdrant) ----
            # Deployed via: helm install qdrant qdrant/qdrant -n openwebui -f qdrant-values.yaml
            - name: VECTOR_DB
              value: "qdrant"

            - name: QDRANT_URI
              value: "http://qdrant:6333"

            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openwebui-secrets
                  key: qdrant-api-key

            - name: ENABLE_QDRANT_MULTITENANCY_MODE
              value: "true"

            - name: QDRANT_PREFER_GRPC
              value: "false"

            # ---- Redis ----
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: openwebui-secrets
                  key: redis-url

            - name: WEBSOCKET_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: openwebui-secrets
                  key: redis-url

            - name: WEBSOCKET_MANAGER
              value: "redis"

            - name: REDIS_SOCKET_CONNECT_TIMEOUT
              value: "5"

            - name: ENABLE_CACHE
              value: "true"

            # ---- RAG ----
            - name: ENABLE_RAG
              value: "true"

            - name: CONTENT_EXTRACTION_ENGINE
              value: "tika"

            - name: TIKA_SERVER_URL
              value: "http://tika:9998"

            - name: ENABLE_RAG_HYBRID_SEARCH
              value: "true"

            - name: ENABLE_RAG_WEB_SEARCH
              value: "true"

            # ---- RAG Embedding (Kubeflow inference) ----
            - name: RAG_EMBEDDING_ENGINE
              value: "openai"

            - name: RAG_OPENAI_API_BASE_URL
              value: "https://inference.kubeflow.vulcan.alliancecan.ca/serving/api/v1"  # SITE-SPECIFIC: your inference endpoint

            - name: RAG_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openwebui-secrets
                  key: inference-api-key

            - name: RAG_EMBEDDING_MODEL
              value: "bge-m3"  # SITE-SPECIFIC: must match a model at your inference endpoint

            # ---- RAG Reranking ----
            - name: ENABLE_RAG_RERANKING
              value: "true"

            - name: RAG_RERANKING_MODEL
              value: "bge-reranker-v2-m3"  # SITE-SPECIFIC

            # ---- Audio STT (Kubeflow inference) ----
            - name: AUDIO_STT_ENGINE
              value: "openai"

            - name: AUDIO_STT_OPENAI_API_BASE_URL
              value: "https://inference.kubeflow.vulcan.alliancecan.ca/serving/api/v1"  # SITE-SPECIFIC

            - name: AUDIO_STT_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openwebui-secrets
                  key: inference-api-key

            - name: AUDIO_STT_MODEL
              value: "whisper-large-v3"  # SITE-SPECIFIC

            # ---- Audio TTS (Kubeflow inference) ----
            - name: AUDIO_TTS_ENGINE
              value: "openai"

            - name: AUDIO_TTS_OPENAI_API_BASE_URL
              value: "https://inference.kubeflow.vulcan.alliancecan.ca/serving/api/v1"  # SITE-SPECIFIC

            - name: AUDIO_TTS_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openwebui-secrets
                  key: inference-api-key

            - name: AUDIO_TTS_MODEL
              value: "kokoro-82m"  # SITE-SPECIFIC

            - name: AUDIO_TTS_VOICE
              value: "af_bella"  # SITE-SPECIFIC

            # ---- Web Search (Perplexity) ----
            - name: ENABLE_WEB_SEARCH
              value: "true"

            - name: RAG_WEB_SEARCH_ENGINE
              value: "perplexity_search"

            - name: WEB_SEARCH_ENGINE
              value: "perplexity_search"

            - name: PERPLEXITY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openwebui-secrets
                  key: perplexity-api-key

            # ---- File Upload ----
            - name: MAX_FILE_SIZE
              value: "100000000"

            # ---- Performance ----
            - name: AIOHTTP_CLIENT_TIMEOUT
              value: "180"

            # ---- Voice Mode ----
            - name: ENABLE_VOICE_MODE
              value: "true"

            - name: VOICE_MODE_STT_ENGINE
              value: "openai"

            - name: VOICE_MODE_TTS_ENGINE
              value: "openai"

            # ---- YouTube Loader ----
            - name: ENABLE_YOUTUBE_LOADER
              value: "true"

            - name: YOUTUBE_LOADER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openwebui-secrets
                  key: youtube-loader-api-key

            # ---- Model Cache ----
            - name: MODEL_CACHE_SIZE
              value: "1000"

            - name: ENABLE_BASE_MODELS_CACHE
              value: "true"

            - name: MODELS_CACHE_TTL
              value: "300"

            # ---- Workspaces ----
            - name: ENABLE_WORKSPACES
              value: "true"

            - name: ENABLE_WORKSPACE_SHARING
              value: "true"

            # ---- Cloud Storage ----
            - name: ENABLE_GOOGLE_DRIVE
              value: "true"

            - name: ENABLE_ONEDRIVE
              value: "true"

            # ---- Autocomplete ----
            - name: ENABLE_AUTOCOMPLETE
              value: "true"

            - name: ENABLE_AUTOCOMPLETE_GENERATION
              value: "true"

            # ---- Direct Connections (MCP/OpenAPI) ----
            - name: ENABLE_DIRECT_CONNECTIONS
              value: "true"

            - name: DIRECT_CONNECTION_TIMEOUT
              value: "30"

            # ---- OpenAI-compatible API (Kubeflow inference) ----
            - name: OPENAI_API_BASE_URL
              value: "https://inference.kubeflow.vulcan.alliancecan.ca/serving/api/v1"  # SITE-SPECIFIC

            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openwebui-secrets
                  key: openai-api-key

            # ---- Image Generation (Kubeflow inference - kandinsky-3) ----
            - name: ENABLE_IMAGE_GENERATION
              value: "true"

            - name: IMAGE_GENERATION_ENGINE
              value: "openai"

            - name: IMAGES_OPENAI_API_BASE_URL
              value: "https://inference.kubeflow.vulcan.alliancecan.ca/serving/api/v1"  # SITE-SPECIFIC

            - name: IMAGES_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openwebui-secrets
                  key: inference-api-key

            - name: IMAGE_GENERATION_MODEL
              value: "kandinsky-3"  # SITE-SPECIFIC

            - name: IMAGE_SIZE
              value: "768x768"  # SITE-SPECIFIC

            - name: IMAGE_STEPS
              value: "80"  # SITE-SPECIFIC

            # ---- Image Editing (Kubeflow inference - kandinsky-3) ----
            - name: ENABLE_IMAGE_EDIT
              value: "true"

            - name: IMAGE_EDIT_SIZE
              value: "768x768"

            - name: IMAGE_EDIT_ENGINE
              value: "openai"

            - name: IMAGES_EDIT_OPENAI_API_BASE_URL
              value: "https://inference.kubeflow.vulcan.alliancecan.ca/serving/api/v1"  # SITE-SPECIFIC

            - name: IMAGES_EDIT_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openwebui-secrets
                  key: inference-api-key

            - name: IMAGE_EDIT_MODEL
              value: "kandinsky-3"  # SITE-SPECIFIC

            # ---- WebSocket / Logging ----
            - name: ENABLE_WEBSOCKET_SUPPORT
              value: "true"

            - name: GLOBAL_LOG_LEVEL
              value: "INFO"

          volumeMounts:
            - name: data
              mountPath: /app/backend/data
            - name: ca-certs
              mountPath: /etc/ssl/certs
              readOnly: true

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5

          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "5"
              memory: "2Gi"

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openwebui-data
        # SITE-SPECIFIC: mounts node CA certs so OpenWebUI trusts internal TLS endpoints.
        # Remove if your cluster doesn't use internal CAs, or change path as needed.
        - name: ca-certs
          hostPath:
            path: /etc/ssl/certs
            type: Directory

---
# Open WebUI Service
apiVersion: v1
kind: Service
metadata:
  name: openwebui
  namespace: openwebui
spec:
  selector:
    app: openwebui
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP

---
# Open WebUI HPA
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: openwebui
  namespace: openwebui
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: openwebui
  minReplicas: 2
  maxReplicas: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: openwebui
  namespace: openwebui
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: openwebui

---
# NetworkPolicy - restrict backend access to openwebui pods only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-access
  namespace: openwebui
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: openwebui
      ports:
        - protocol: TCP
          port: 5432

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-access
  namespace: openwebui
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: openwebui
      ports:
        - protocol: TCP
          port: 6379

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: qdrant-access
  namespace: openwebui
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: qdrant
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: openwebui
      ports:
        - protocol: TCP
          port: 6333
        - protocol: TCP
          port: 6334
    # SITE-SPECIFIC: allow Prometheus scraping — change namespace to match your monitoring stack
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cattle-monitoring-system
      ports:
        - protocol: TCP
          port: 6333

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tika-access
  namespace: openwebui
spec:
  podSelector:
    matchLabels:
      app: tika
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: openwebui
      ports:
        - protocol: TCP
          port: 9998

---
# Traefik ServersTransport — long timeouts for streaming/WebSocket, HTTP/2 disabled
# so Traefik speaks HTTP/1.1 to the backend (required for WebSocket upgrade).
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: openwebui-transport
  namespace: openwebui
spec:
  disableHTTP2: true
  forwardingTimeouts:
    dialTimeout: 30s
    idleConnTimeout: 300s
    responseHeaderTimeout: 300s

---
# SITE-SPECIFIC: Traefik IngressRoute — change Host match and TLS secretName to your domain
# No buffering middleware needed: Traefik streams responses by default.
# serversTransport provides the 300s timeouts + HTTP/1.1 for WebSocket/SSE.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: openwebui
  namespace: openwebui
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`llm.vulcan.alliancecan.ca`)
      services:
        - name: openwebui
          port: 80
          serversTransport: openwebui-transport
  tls:
    secretName: openwebui-vulcan-alliancecan-ca-tls

---
# SITE-SPECIFIC: TLS Certificate — change to your domain and ClusterIssuer
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: openwebui-vulcan-alliancecan-ca
  namespace: openwebui
spec:
  secretName: openwebui-vulcan-alliancecan-ca-tls
  issuerRef:
    name: letsencrypt-dns
    kind: ClusterIssuer
  commonName: llm.vulcan.alliancecan.ca
  dnsNames:
    - llm.vulcan.alliancecan.ca
