---
apiVersion: v1
kind: Namespace
metadata:
  name: openwebui

---
# Secret for Perplexity Search API
apiVersion: v1
kind: Secret
metadata:
  name: openwebui-secrets
  namespace: openwebui
type: Opaque
stringData:
  perplexity-api-key: "YOUR_PERPLEXITY_API_KEY_HERE"
  webui-secret-key: "YOUR_WEBUI_SECRET_KEY_HERE"
  postgres-password: "YOUR_POSTGRES_PASSWORD_HERE"
  database-url: "postgresql://openwebui:YOUR_POSTGRES_PASSWORD_HERE@postgres:5432/openwebui"
  youtube-loader-api-key: "YOUR_YOUTUBE_API_KEY_HERE"

---
# Apache Tika Deployment (Content Extraction Engine for RAG)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tika
  namespace: openwebui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tika
  template:
    metadata:
      labels:
        app: tika
    spec:
      containers:
        - name: tika
          image: apache/tika:latest-full  # Full version includes OCR with Tesseract
          ports:
            - containerPort: 9998
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "4Gi"  # Tika can be memory-intensive with OCR
---
# Apache Tika Service
apiVersion: v1
kind: Service
metadata:
  name: tika
  namespace: openwebui
spec:
  selector:
    app: tika
  ports:
    - port: 9998
      targetPort: 9998
  type: ClusterIP
---

# PostgreSQL PersistentVolumeClaim
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: openwebui
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: nfs-client

---
# PostgreSQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: openwebui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "openwebui"
              
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openwebui-secrets
                  key: postgres-password

            - name: POSTGRES_DB
              value: "openwebui"

          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: openwebui
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openwebui-data
  namespace: openwebui
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: nfs-client

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: openwebui
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: nfs-client

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: openwebui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7.2
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
          command: ["sh", "-c"]
          args:
            - |
              exec redis-server \
                --save "" \
                --appendonly yes \
                --requirepass "YOUR_REDIS_PASSWORD_HERE"
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: openwebui
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  namespace: openwebui
  labels:
    app: openwebui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: openwebui
  template:
    metadata:
      labels:
        app: openwebui
    spec:
      hostAliases:
        - ip: "10.0.0.100"
          hostnames:
            - ray-service
        - ip: "10.0.0.101"
          hostnames:
            - ldap-server-01.example.com
            - ldap1
            - ldap1.internal.local
        - ip: "10.0.0.102"
          hostnames:
            - ldap-server-02.example.com
            - ldap2
            - ldap2.internal.local
      containers:
        - name: openwebui
          image: ghcr.io/open-webui/open-webui:latest
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8080
              name: http

          env:
            - name: WEBUI_NAME
              value: "Example Cluster"

            - name: WEBUI_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: openwebui-secrets
                  key: webui-secret-key

            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: openwebui-secrets
                  key: database-url

            - name: DATA_DIR
              value: "/app/backend/data"

            - name: WEBUI_URL
              value: "https://openwebui.example.com"  # Required for OAuth/OIDC

            - name: ENABLE_COMMUNITY_SHARING
              value: "true"

            - name: ENABLE_MESSAGE_RATING
              value: "true"

            - name: ENABLE_COMMENT_ON_SHARED_CHAT
              value: "true"

            - name: ENABLE_API_KEYS  # Updated from deprecated ENABLE_API_KEY
              value: "true"

            - name: ENABLE_USER_WEBHOOKS  # Explicitly enable user webhooks
              value: "true"

            - name: ENABLE_SIGNUP
              value: "false"

            - name: DEFAULT_USER_ROLE
              value: "user"

            # ---- Vector Database (RAG) ----
            - name: VECTOR_DB
              value: "pgvector"
            
            - name: PGVECTOR_CREATE_EXTENSION
              value: "true"  # Will try to auto-create pgvector extension

            - name: PGVECTOR_INDEX_METHOD
              value: "hnsw"  # Better query performance (optional)              

            # ---- LDAP ----
            - name: ENABLE_LDAP
              value: "true"

            - name: LDAP_SERVER_LABEL
              value: "Example LDAP Server"

            - name: LDAP_SERVER_HOST
              value: "ldap-server-01.example.com"

            - name: LDAP_SERVER_PORT
              value: "636"

            # LDAPS
            - name: LDAP_USE_TLS
              value: "true"

            # Disable cert verification (IP pinning / hostAliases)
            - name: LDAP_VALIDATE_CERT
              value: "false"

            # Username & mail attributes
            - name: LDAP_ATTRIBUTE_FOR_USERNAME
              value: "uid"

            # Base DN for users
            - name: LDAP_SEARCH_BASE
              value: "dc=example,dc=com"

            # Extra filter ONLY (username auto-added by Open WebUI)
            - name: LDAP_SEARCH_FILTER
              value: "(objectClass=posixAccount)"

            - name: LDAP_ATTRIBUTE_FOR_MAIL
              value: "uid"

            # ---- Providers ----
            - name: DISABLE_PROVIDER_EDIT
              value: "false"  # Allow users to add their own providers

            # ---- General Settings ----
            - name: ENABLE_LOGIN_FORM
              value: "true"

            - name: CORS_ALLOW_ORIGIN
              value: "*"  # Required for websockets

            - name: ENABLE_WEBSOCKET_SUPPORT
              value: "true"  # Explicit (default is true)              

            - name: REDIS_URL
              value: "redis://:YOUR_REDIS_PASSWORD_HERE@redis:6379/0"

            - name: WEBSOCKET_REDIS_URL
              value: "redis://:YOUR_REDIS_PASSWORD_HERE@redis:6379/0"

            - name: WEBSOCKET_MANAGER
              value: "redis"

            - name: REDIS_SOCKET_CONNECT_TIMEOUT
              value: "5"

            - name: ENABLE_CACHE
              value: "true"

            # ---- RAG (Retrieval Augmented Generation) ----
            - name: ENABLE_RAG
              value: "true"

            # ---- Content Extraction Engine (Tika) ----
            - name: CONTENT_EXTRACTION_ENGINE
              value: "tika"  # Use Apache Tika for document processing

            - name: TIKA_SERVER_URL
              value: "http://tika:9998"  # Tika service URL in same namespace

            - name: ENABLE_RAG_HYBRID_SEARCH
              value: "true"

            - name: ENABLE_RAG_WEB_SEARCH
              value: "true"

            # ---- Audio / Speech-to-Text (Local Whisper) ----
            - name: AUDIO_STT_ENGINE
              value: ""  # Empty = use local Whisper (no OpenAI needed)

            - name: WHISPER_MODEL
              value: "base"  # Options: tiny, base, small, medium, large

            - name: WHISPER_COMPUTE_TYPE
              value: "int8"  # int8 for CPU, float16 for GPU

            - name: WHISPER_VAD_FILTER
              value: "true"  # Voice Activity Detection

            - name: WHISPER_MULTILINGUAL
              value: "true"

            # ---- Text-to-Speech (Optional - users can add their own) ----
            - name: AUDIO_TTS_ENGINE
              value: ""  # Empty = disabled, users can configure their own

            # ---- Web Search (Perplexity AI Search) ----
            # Perplexity provides AI-powered search with citations
            # Better than Google for AI use cases - generates comprehensive answers
            - name: ENABLE_WEB_SEARCH
              value: "true"

            - name: RAG_WEB_SEARCH_ENGINE
              value: "perplexity"  # AI-powered search with citations

            - name: WEB_SEARCH_ENGINE
              value: "perplexity"  # AI-powered search with citations

            - name: PERPLEXITY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openwebui-secrets
                  key: perplexity-api-key

            # ---- File Upload ----
            - name: MAX_FILE_SIZE
              value: "100000000"  # 100MB

            # ---- Performance ----
            - name: AIOHTTP_CLIENT_TIMEOUT
              value: "300"

            # ---- Voice Mode (STT + TTS) ----
            - name: ENABLE_VOICE_MODE
              value: "true"  # Enables voice conversations

            - name: VOICE_MODE_STT_ENGINE
              value: ""  # Uses local Whisper (already configured above)

            - name: VOICE_MODE_TTS_ENGINE
              value: ""  # Users can configure their own TTS

            # ---- YouTube Loader ----
            - name: ENABLE_YOUTUBE_LOADER
              value: "true"  # Extract transcripts from YouTube videos for RAG

            - name: YOUTUBE_LOADER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openwebui-secrets
                  key: youtube-loader-api-key

            - name: MODEL_CACHE_SIZE
              value: "1000"  # Max number of cached responses

            # ---- Workspaces (Already enabled by default, but explicit) ----
            - name: ENABLE_WORKSPACES
              value: "true"  # Team collaboration workspaces

            - name: ENABLE_WORKSPACE_SHARING
              value: "true"  # Share workspaces between users

            # ---- Cloud Storage Integration (Users configure OAuth) ----
            - name: ENABLE_GOOGLE_DRIVE
              value: "true"  # Import documents from Google Drive

            # Note: Users need to configure GOOGLE_DRIVE_CLIENT_ID and GOOGLE_DRIVE_CLIENT_SECRET

            - name: ENABLE_ONEDRIVE
              value: "true"  # Import documents from OneDrive

            # ---- Autocomplete (Already enabled by default, but explicit) ----
            - name: ENABLE_AUTOCOMPLETE
              value: "true"  # AI-powered autocomplete in chat

            # ---- Direct Connections (MCP/OpenAPI Tools) ----
            - name: ENABLE_DIRECT_CONNECTIONS
              value: "true"  # Connect to external tool servers (MCP/OpenAPI)

            - name: DIRECT_CONNECTION_TIMEOUT
              value: "30"  # Timeout for direct connections in seconds

            # ---- Model Caching ----
            - name: ENABLE_BASE_MODELS_CACHE
              value: "true"  # Cache base model list in memory

            - name: MODELS_CACHE_TTL
              value: "300"  # Cache TTL in seconds (5 minutes)

            - name: ENABLE_AUTOCOMPLETE_GENERATION
              value: "true"

            # ---- Image Generation (AUTOMATIC1111) ----
            - name: ENABLE_IMAGE_GENERATION
              value: "true"  # Enable image generation features

            - name: IMAGE_GENERATION_ENGINE
              value: "automatic1111"  # Use AUTOMATIC1111 engine

            - name: AUTOMATIC1111_BASE_URL
              value: "http://ray:9202/automatic1111-adapter/"

            - name: IMAGE_SIZE
              value: "1024x1024"  # Default image dimensions (WIDTHxHEIGHT, e.g., 1024x1024)

            - name: IMAGE_STEPS
              value: "80"  # Default iteration steps for image generation

          volumeMounts:
            - name: data
              mountPath: /app/backend/data
            - name: ca-certs
              mountPath: /etc/ssl/certs
              readOnly: true

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20

          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "4"
              memory: "8Gi"

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openwebui-data
        - name: ca-certs
          hostPath:
            path: /etc/ssl/certs
            type: Directory

---
apiVersion: v1
kind: Service
metadata:
  name: openwebui
  namespace: openwebui
  annotations:
    traefik.ingress.kubernetes.io/service.sticky.cookie: "true"
    traefik.ingress.kubernetes.io/service.nativelb: "true"

spec:
  selector:
    app: openwebui
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: openwebui
  namespace: openwebui
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: openwebui
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: openwebui
  namespace: openwebui
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: openwebui

