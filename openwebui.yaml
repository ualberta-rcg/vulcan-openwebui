---
apiVersion: v1
kind: Namespace
metadata:
  name: openwebui

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openwebui-data
  namespace: openwebui
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: nfs-client

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  namespace: openwebui
  labels:
    app: openwebui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openwebui
  template:
    metadata:
      labels:
        app: openwebui
    spec:
      hostAliases:
        - ip: "1.2.3.4"
          hostnames:
            - ldap1
            - ldap1.vulcan.local
        - ip: "1.2.3.4"
          hostnames:
            - ldap2
            - ldap2.vulcan.local
      containers:
        - name: openwebui
          image: ghcr.io/open-webui/open-webui:latest
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8080
              name: http

          env:
            - name: WEBUI_NAME
              value: "Vulcan Cluster - Open Web UI"

            - name: DATA_DIR
              value: "/app/backend/data"

            - name: ENABLE_SIGNUP
              value: "false"

            - name: DEFAULT_USER_ROLE
              value: "user"

            # ---- LDAP ----
            - name: ENABLE_LDAP
              value: "true"

            - name: LDAP_SERVER_LABEL
              value: "OpenLDAP"

            - name: LDAP_SERVER_HOST
              value: ""

            - name: LDAP_SERVER_PORT
              value: "636"

            # LDAPS
            - name: LDAP_USE_TLS
              value: "true"

            # Disable cert verification (IP pinning / hostAliases)
            - name: LDAP_VALIDATE_CERT
              value: "false"

            # Username & mail attributes
            - name: LDAP_ATTRIBUTE_FOR_USERNAME
              value: "uid"

            - name: LDAP_ATTRIBUTE_FOR_MAIL
              value: "mail"

            # Base DN for users
            - name: LDAP_SEARCH_BASE
              value: ""

            # Extra filter ONLY (username auto-added by Open WebUI)
            - name: LDAP_SEARCH_FILTER
              value: "(objectClass=posixAccount)"

            # ---- Providers ----
            - name: DISABLE_PROVIDER_EDIT
              value: "true"

            - name: LDAP_ATTRIBUTE_FOR_MAIL
              value: "uid"


          volumeMounts:
            - name: data
              mountPath: /app/backend/data
            - name: ca-certs
              mountPath: /etc/ssl/certs
              readOnly: true

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "4Gi"

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openwebui-data
        - name: ca-certs
          hostPath:
            path: /etc/ssl/certs
            type: Directory

---
apiVersion: v1
kind: Service
metadata:
  name: openwebui
  namespace: openwebui
  annotations:
    traefik.ingress.kubernetes.io/service.nativelb: "true"

spec:
  selector:
    app: openwebui
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: openwebui-vulcan-alliancecan-ca
  namespace: openwebui
spec:
  secretName: openwebui-vulcan-alliancecan-ca-tls
  issuerRef:
    name: letsencrypt-dns
    kind: ClusterIssuer
  commonName: openwebui.vulcan.alliancecan.ca
  dnsNames:
    - openwebui.vulcan.alliancecan.ca

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openwebui-ingress
  namespace: openwebui
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - openwebui.vulcan.alliancecan.ca
      secretName: openwebui-vulcan-alliancecan-ca-tls
  rules:
    - host: openwebui.vulcan.alliancecan.ca
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openwebui
                port:
                  number: 80

