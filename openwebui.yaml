---
apiVersion: v1
kind: Namespace
metadata:
  name: openwebui

---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: openwebui
type: Opaque
stringData:
  REDIS_PASSWORD: gT9@Xz!fV1qLp#73MwYu@Kd!9RzHbX6c

---
# Secret for Google Search API (must be created before deployment)
# Run: kubectl create secret generic openwebui-secrets -n openwebui \
#   --from-literal=google-search-api-key='YOUR_API_KEY' \
#   --from-literal=google-search-engine-id='YOUR_ENGINE_ID'
# Or create manually and update this placeholder:
apiVersion: v1
kind: Secret
metadata:
  name: openwebui-secrets
  namespace: openwebui
type: Opaque
stringData:
  google-search-api-key: ""  # Replace with your Google Custom Search API key
  google-search-engine-id: ""  # Replace with your Search Engine ID

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openwebui-data
  namespace: openwebui
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: nfs-client

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: openwebui
spec:
  selector:
    matchLabels:
      app: redis
  serviceName: redis
  replicas: 1
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7.2
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_PASSWORD
          args: ["--save", "", "--appendonly", "yes", "--requirepass", "$(REDIS_PASSWORD)"]
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: nfs-client
        resources:
          requests:
            storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: openwebui
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  namespace: openwebui
  labels:
    app: openwebui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: openwebui
  template:
    metadata:
      labels:
        app: openwebui
    spec:
      hostAliases:
        - ip: "1.2.3.4"
          hostnames:
            - ldap1
            - ldap1.vulcan.local
        - ip: "1.2.3.4"
          hostnames:
            - ldap2
            - ldap2.vulcan.local
      containers:
        - name: openwebui
          image: ghcr.io/open-webui/open-webui:latest
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8080
              name: http

          env:
            - name: WEBUI_NAME
              value: "Vulcan Cluster - Open Web UI"

            - name: DATA_DIR
              value: "/app/backend/data"

            - name: ENABLE_SIGNUP
              value: "false"

            - name: DEFAULT_USER_ROLE
              value: "user"

            # ---- LDAP ----
            - name: ENABLE_LDAP
              value: "true"

            - name: LDAP_SERVER_LABEL
              value: "OpenLDAP"

            - name: LDAP_SERVER_HOST
              value: ""

            - name: LDAP_SERVER_PORT
              value: "636"

            # LDAPS
            - name: LDAP_USE_TLS
              value: "true"

            # Disable cert verification (IP pinning / hostAliases)
            - name: LDAP_VALIDATE_CERT
              value: "false"

            # Username & mail attributes
            - name: LDAP_ATTRIBUTE_FOR_USERNAME
              value: "uid"

            - name: LDAP_ATTRIBUTE_FOR_MAIL
              value: "mail"

            # Base DN for users
            - name: LDAP_SEARCH_BASE
              value: ""

            # Extra filter ONLY (username auto-added by Open WebUI)
            - name: LDAP_SEARCH_FILTER
              value: "(objectClass=posixAccount)"

            # ---- Providers ----
            - name: DISABLE_PROVIDER_EDIT
              value: "false"  # Allow users to add their own providers

            # ---- General Settings ----
            - name: ENABLE_LOGIN_FORM
              value: "true"

            - name: ENABLE_COMMUNITY_SHARING
              value: "true"

            - name: ENABLE_MESSAGE_RATING
              value: "true"

            - name: ENABLE_COMMENT_ON_SHARED_CHAT
              value: "true"

            - name: ENABLE_API_KEY
              value: "true"

            # ---- Redis ----
            - name: ENABLE_REDIS
              value: "true"

            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis:6379/0"

            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_PASSWORD

            - name: CACHE_TYPE
              value: "redis"

            - name: ENABLE_CACHE
              value: "true"

            # ---- RAG (Retrieval Augmented Generation) ----
            - name: ENABLE_RAG
              value: "true"

            - name: ENABLE_RAG_HYBRID_SEARCH
              value: "true"

            - name: ENABLE_RAG_WEB_SEARCH
              value: "true"

            - name: RAG_EMBEDDING_ENGINE
              value: "local"  # Use local embeddings (no API needed)

            - name: RAG_EMBEDDING_MODEL
              value: "all-MiniLM-L6-v2"  # Lightweight local model (384 dim)

            - name: RAG_EMBEDDING_DIMENSION
              value: "384"  # Dimension for all-MiniLM-L6-v2

            - name: RAG_TOP_K
              value: "4"

            - name: RAG_CHUNK_SIZE
              value: "1000"

            - name: RAG_CHUNK_OVERLAP
              value: "200"

            # ---- Audio / Speech-to-Text (Local Whisper) ----
            - name: AUDIO_STT_ENGINE
              value: ""  # Empty = use local Whisper (no OpenAI needed)

            - name: WHISPER_MODEL
              value: "base"  # Options: tiny, base, small, medium, large

            - name: WHISPER_COMPUTE_TYPE
              value: "int8"  # int8 for CPU, float16 for GPU

            - name: WHISPER_VAD_FILTER
              value: "true"  # Voice Activity Detection

            - name: WHISPER_MULTILINGUAL
              value: "true"

            # ---- Text-to-Speech (Optional - users can add their own) ----
            - name: AUDIO_TTS_ENGINE
              value: ""  # Empty = disabled, users can configure their own

            # ---- Web Search (Google Custom Search via GCP) ----
            # Instructions to set up Google Custom Search:
            # 1. Create Custom Search Engine: https://programmablesearchengine.google.com/
            #    - Click "Add" to create new search engine
            #    - Enter sites to search (or leave blank for web-wide search)
            #    - Copy your Search Engine ID (format: 123456789012345678901:abcdefghijk)
            # 2. Get API Key from GCP: https://console.cloud.google.com/
            #    - Enable "Custom Search API" in your project
            #    - Go to "Credentials" → "Create Credentials" → "API Key"
            #    - Copy your API key
            # 3. Create Kubernetes Secret:
            #    kubectl create secret generic openwebui-secrets -n openwebui \
            #      --from-literal=google-search-api-key='YOUR_API_KEY' \
            #      --from-literal=google-search-engine-id='YOUR_ENGINE_ID'
            # 4. Free tier: 100 queries/day, then $5 per 1,000 queries
            - name: ENABLE_WEB_SEARCH
              value: "true"

            - name: RAG_WEB_SEARCH_ENGINE
              value: "google"  # or tavily, perplexity (users can configure)

            - name: GOOGLE_SEARCH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openwebui-secrets
                  key: google-search-api-key

            - name: GOOGLE_SEARCH_ENGINE_ID
              valueFrom:
                secretKeyRef:
                  name: openwebui-secrets
                  key: google-search-engine-id

            # ---- File Upload ----
            - name: MAX_FILE_SIZE
              value: "100000000"  # 100MB

            # ---- Performance ----
            - name: AIOHTTP_CLIENT_TIMEOUT
              value: "300"

            - name: AIOHTTP_CLIENT_READ_TIMEOUT
              value: "300"

            # ---- Voice Mode (STT + TTS) ----
            - name: ENABLE_VOICE_MODE
              value: "true"  # Enables voice conversations

            - name: VOICE_MODE_STT_ENGINE
              value: ""  # Uses local Whisper (already configured above)

            - name: VOICE_MODE_TTS_ENGINE
              value: ""  # Users can configure their own TTS

            # ---- YouTube Loader ----
            - name: ENABLE_YOUTUBE_LOADER
              value: "true"  # Extract transcripts from YouTube videos for RAG

            # Note: Users need to add YOUTUBE_LOADER_API_KEY in their settings

            # ---- Model Caching ----
            - name: ENABLE_MODEL_CACHING
              value: "true"  # Cache model responses for performance

            - name: MODEL_CACHE_SIZE
              value: "1000"  # Max number of cached responses

            - name: MODEL_CACHE_TTL
              value: "3600"  # Cache TTL in seconds (1 hour)

            # ---- Workspaces (Already enabled by default, but explicit) ----
            - name: ENABLE_WORKSPACES
              value: "true"  # Team collaboration workspaces

            - name: ENABLE_WORKSPACE_SHARING
              value: "true"  # Share workspaces between users

            # ---- Cloud Storage Integration (Users configure OAuth) ----
            - name: ENABLE_GOOGLE_DRIVE
              value: "true"  # Import documents from Google Drive

            # Note: Users need to configure GOOGLE_DRIVE_CLIENT_ID and GOOGLE_DRIVE_CLIENT_SECRET

            - name: ENABLE_ONEDRIVE
              value: "true"  # Import documents from OneDrive

            # Note: Users need to configure ONEDRIVE_CLIENT_ID and ONEDRIVE_CLIENT_SECRET

            # ---- Autocomplete (Already enabled by default, but explicit) ----
            - name: ENABLE_AUTOCOMPLETE
              value: "true"  # AI-powered autocomplete in chat

            # ---- Direct Connections (MCP/OpenAPI Tools) ----
            - name: ENABLE_DIRECT_CONNECTIONS
              value: "true"  # Connect to external tool servers (MCP/OpenAPI)

            - name: DIRECT_CONNECTION_TIMEOUT
              value: "30"  # Timeout for direct connections in seconds


          volumeMounts:
            - name: data
              mountPath: /app/backend/data
            - name: ca-certs
              mountPath: /etc/ssl/certs
              readOnly: true

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20

          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "4"
              memory: "8Gi"

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openwebui-data
        - name: ca-certs
          hostPath:
            path: /etc/ssl/certs
            type: Directory

---
apiVersion: v1
kind: Service
metadata:
  name: openwebui
  namespace: openwebui
  annotations:
    traefik.ingress.kubernetes.io/service.nativelb: "true"

spec:
  selector:
    app: openwebui
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: openwebui
  namespace: openwebui
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: openwebui
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: openwebui
  namespace: openwebui
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: openwebui

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: openwebui-vulcan-alliancecan-ca
  namespace: openwebui
spec:
  secretName: openwebui-vulcan-alliancecan-ca-tls
  issuerRef:
    name: letsencrypt-dns
    kind: ClusterIssuer
  commonName: openwebui.vulcan.alliancecan.ca
  dnsNames:
    - openwebui.vulcan.alliancecan.ca

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openwebui-ingress
  namespace: openwebui
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - openwebui.vulcan.alliancecan.ca
      secretName: openwebui-vulcan-alliancecan-ca-tls
  rules:
    - host: openwebui.vulcan.alliancecan.ca
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openwebui
                port:
                  number: 80

