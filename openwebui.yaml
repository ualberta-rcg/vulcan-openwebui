---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openwebui-ingress
  namespace: openwebui
  annotations:
#    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
#  tls:
#    - hosts:
